<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hong Kong Transit Density Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #080c14;
    --surface:   #111827;
    --surface2:  #1e293b;
    --border:    #1e3a5f;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --kmb:       #ef4444;
    --ctb:       #eab308;
    --nlb:       #22c55e;
    --other:     #a78bfa;
    --mtr:       #00bcd4;
    --accent:    #6366f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────── */
  .header {
    height: 54px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 900;
    position: relative;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--mtr), var(--kmb), var(--ctb));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Buttons ────────────────────────────── */
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Layout ─────────────────────────────── */
  .app { display: flex; height: calc(100vh - 54px); }

  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #map { flex: 1; }

  /* ── Sidebar sections ───────────────────── */
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Stats cards */
  .stat-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 3px solid var(--muted);
  }
  .stat-card.kmb  { border-left-color: var(--kmb); }
  .stat-card.ctb  { border-left-color: var(--ctb); }
  .stat-card.nlb  { border-left-color: var(--nlb); }
  .stat-card.mtr  { border-left-color: var(--mtr); }
  .stat-card .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-card .stat-info { flex: 1; }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); }
  .stat-card .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
  }

  /* Layer toggles */
  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    background: var(--surface2);
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .layer-toggle:hover { background: #263347; }
  .layer-toggle input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
  .layer-toggle .layer-name { font-size: 13px; font-weight: 600; flex: 1; }
  .layer-toggle .layer-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Density legend */
  .density-legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .density-bar {
    flex: 1;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #0d47a1, #1565c0, #42a5f5, #66bb6a, #fdd835, #ff9800, #e53935);
  }

  /* Status */
  .status {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 6px;
  }

  /* ── Leaflet overrides ──────────────────── */
  .leaflet-container { background: #060a10 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution { display: none !important; }

  /* Tooltip */
  .stop-popup .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-radius: 8px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 30px rgba(0,0,0,.6) !important;
  }
  .stop-popup .leaflet-popup-tip { background: var(--surface) !important; }
  .popup-title { font-weight: 700; font-size: 13px; }
  .popup-sub  { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .popup-tag  {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; max-height: 35vh; flex-direction: row; flex-wrap: wrap; }
    .sidebar > div { min-width: 200px; flex: 1; }
  }
</style>
</head>

<body>

<!-- ─── Header ───────────────────────────── -->
<div class="header">
  <h1>Hong Kong Transit Density</h1>
  <div class="header-right">
    <button class="btn" id="btnLoad" onclick="loadBusData()">Load Bus Stops</button>
    <button class="btn" id="btnDensity" onclick="toggleDensity()">Density Grid</button>
  </div>
</div>

<!-- ─── App ──────────────────────────────── -->
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">

    <div>
      <div class="section-title">Transit Providers</div>

      <div class="stat-card mtr">
        <div class="stat-dot" style="background:var(--mtr)"></div>
        <div class="stat-info">
          <div class="stat-label">MTR (Rail)</div>
          <div class="stat-value" id="cntMTR">—</div>
        </div>
      </div>
      <br>
      <div class="stat-card kmb">
        <div class="stat-dot" style="background:var(--kmb)"></div>
        <div class="stat-info">
          <div class="stat-label">KMB (Kowloon Motor Bus)</div>
          <div class="stat-value" id="cntKMB">—</div>
        </div>
      </div>
      <br>
      <div class="stat-card ctb">
        <div class="stat-dot" style="background:var(--ctb)"></div>
        <div class="stat-info">
          <div class="stat-label">CTB (Citybus)</div>
          <div class="stat-value" id="cntCTB">—</div>
        </div>
      </div>
      <br>
      <div class="stat-card nlb">
        <div class="stat-dot" style="background:var(--nlb)"></div>
        <div class="stat-info">
          <div class="stat-label">NLB (New Lantou Bus)</div>
          <div class="stat-value" id="cntNLB">—</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Map Layers</div>
      <label class="layer-toggle">
        <input type="checkbox" checked onchange="toggleLayer('mtrLines',this.checked)">
        <span class="layer-name">MTR Lines</span>
      </label>
      <br>
      <label class="layer-toggle">
        <input type="checkbox" checked onchange="toggleLayer('mtrStations',this.checked)">
        <span class="layer-name">MTR Stations</span>
      </label>
      <br>
      <label class="layer-toggle">
        <input type="checkbox" checked id="chkKMB" onchange="toggleLayer('kmb',this.checked)">
        <span class="layer-name">KMB Stops</span>
        <span class="layer-count" id="kmbBadge"></span>
      </label>
      <br>
      <label class="layer-toggle">
        <input type="checkbox" checked id="chkCTB" onchange="toggleLayer('ctb',this.checked)">
        <span class="layer-name">CTB Stops</span>
        <span class="layer-count" id="ctbBadge"></span>
      </label>
      <br>
      <label class="layer-toggle">
        <input type="checkbox" checked id="chkNLB" onchange="toggleLayer('nlb',this.checked)">
        <span class="layer-name">NLB Stops</span>
        <span class="layer-count" id="nlbBadge"></span>
      </label>
    </div>

    <div>
      <div class="section-title">Density Legend</div>
      <div class="density-legend">
        <span>Low</span>
        <div class="density-bar"></div>
        <span>High</span>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:6px;">
        Grid cells (≈500 m) coloured by combined stop count.
        Toggle with the <b>Density Grid</b> button.
      </p>
    </div>

    <div class="status" id="status">Ready — click <b>Load Bus Stops</b></div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<script>

// I'll provide the real compact data now:

const MTR_LINE_DEFS = [
  {name:"Tsuen Wan Line",     color:"#E2231B", ids:["Central","Admiralty","Tsim Sha Tsui","Jordan","Yau Ma Tei","Mong Kok","Prince Edward","Sham Shui Po","Cheung Sha Wan","Lai Chi Kok","Mei Foo","Lai King","Kwai Fong","Kwai Hing","Tai Wo Hau","Tsuen Wan"]},

  {name:"Kwun Tong Line",     color:"#00AB4E", ids:["Whampoa","Ho Man Tin","Yau Ma Tei","Mong Kok","Prince Edward","Shek Kip Mei","Kowloon Tong","Lok Fu","Wong Tai Sin","Diamond Hill","Choi Hung","Kowloon Bay","Ngau Tau Kok","Kwun Tong","Lam Tin","Yau Tong","Tiu Keng Leng"]},
  {name:"East Rail Line",     color:"#53B7E8", ids:["Admiralty","Exhibition Centre","Hung Hom","Mong Kok East","Kowloon Tong","Tai Wai","Sha Tin","Fo Tan","University","Tai Po Market","Tai Wo","Fanling","Sheung Shui","Lo Wu"]},
  {name:"East Rail Line (Spur)", color:"#53B7E8", ids:["Sheung Shui", "Lok Ma Chau"]},
  {name:"Tuen Ma Line",       color:"#9A2268", ids:["Wu Kai Sha","Ma On Shan","Heng On","Tai Shui Hang","Shek Mun","City One","Sha Tin Wai","Tai Wai","Diamond Hill","Kai Tak","Sung Wong Toi","To Kwa Wan","Hung Hom","East Tsim Sha Tsui","Austin","Nam Cheong","Mei Foo","Tsuen Wan West","Kam Sheung Road","Yuen Long","Long Ping","Tin Shui Wai","Siu Hong","Tuen Mun"]},

  {name:"Disneyland Resort Line",color:"#ED72A2",ids:["Sunny Bay","Disneyland Resort"]},
  {name:"Airport Express",    color:"#006889",ids:["Hong Kong","Kowloon","Tsing Yi","Airport","AsiaWorld-Expo"]},
];

/* ================================================================
   MAP INITIALISATION
   ================================================================ */
const map = L.map('map', {
  center: [22.3193, 114.1694],
  zoom: 12,
  minZoom: 10,
  maxZoom: 18,
  zoomControl: true,
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

/* ================================================================
   LAYER GROUPS
   ================================================================ */
const layers = {
  mtrLines:     L.layerGroup().addTo(map),
  mtrStations:  L.layerGroup().addTo(map),
  kmb:          L.layerGroup().addTo(map),
  ctb:          L.layerGroup().addTo(map),
  nlb:          L.layerGroup().addTo(map),
  density:      L.layerGroup(),          // not added by default
};

// Build a lookup dict for station coords
const stationMap = {};
MTR_STATIONS.forEach(s => { stationMap[s.n] = s; });

// Draw MTR lines
MTR_LINE_DEFS.forEach(line => {
  const coords = line.ids
    .map(id => stationMap[id])
    .filter(Boolean)
    .map(s => [s.la, s.lo]);
  if (coords.length > 1) {
    L.polyline(coords, {
      color: line.color,
      weight: 3.5,
      opacity: 0.8,
      lineJoin: 'round',
    }).bindTooltip(line.name, {sticky:true}).addTo(layers.mtrLines);
  }
});

// Draw MTR station dots
const drawnStations = new Set();
MTR_STATIONS.forEach(s => {
  if (drawnStations.has(s.n)) return;
  drawnStations.add(s.n);
  L.circleMarker([s.la, s.lo], {
    radius: 4,
    fillColor: '#ffffff',
    fillOpacity: 1,
    color: '#000',
    weight: 1,
  }).bindTooltip(s.n, {direction:'top', offset:[0,-6]}).addTo(layers.mtrStations);
});

document.getElementById('cntMTR').textContent = drawnStations.size;

/* ================================================================
   BUS STOP LOADING
   ================================================================ */
let densityOn = false;
let busData  = null;   // { kmb: [...], ctb: [...] }

const OP_COLORS = {
  kmb:   {fill:'#ef4444', border:'#dc2626'},
  ctb:   {fill:'#eab308', border:'#ca8a04'},
  nlb:   {fill:'#22c55e', border:'#16a34a'},
  nwfb:  {fill:'#22c55e', border:'#16a34a'},
  default:{fill:'#a78bfa', border:'#7c3aed'},
};

function opColor(op) {
  return OP_COLORS[op] || OP_COLORS.default;
}

async function loadBusData() {
  const btn = document.getElementById('btnLoad');
  const status = document.getElementById('status');

  // Manual file selection
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';

  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    btn.disabled = true;
    status.textContent = `Reading ${file.name} …`;

    try {
      const text = await file.text();
      busData = JSON.parse(text);
      renderBusStops();
      btn.textContent = 'Reload';
    } catch (err) {
      status.textContent = 'Failed to parse JSON: ' + err.message;
      btn.disabled = false;
    }
  };

  input.click();
}

function renderBusStops() {
  const status = document.getElementById('status');
  const btn = document.getElementById('btnLoad');

  layers.kmb.clearLayers();
  layers.ctb.clearLayers();
  layers.nlb.clearLayers();

  let totalKMB = 0, totalCTB = 0, totalNLB = 0, totalOther = 0;

  for (const [operator, stops] of Object.entries(busData)) {
    const op = operator.toLowerCase();
    const col = opColor(op);
    const targetLayer = op === 'kmb' ? layers.kmb
                      : op === 'ctb' ? layers.ctb
                      : op === 'nlb' ? layers.nlb
                      : null;

    stops.forEach(stop => {
      const marker = L.circleMarker([stop.lat, stop.lng], {
        radius: 3.5,
        fillColor: col.fill,
        fillOpacity: 0.55,
        color: col.border,
        weight: 0.5,
        opacity: 0.7,
      });

      const nameEN = stop.name_en || '';
      const nameTC = stop.name_tc || '';
      marker.bindPopup(
        '<div class="popup-title">' + (nameTC || nameEN) + '</div>' +
        (nameTC && nameEN ? '<div class="popup-sub">' + nameEN + '</div>' : '') +
        '<span class="popup-tag" style="background:' + col.fill + ';color:#000">' + op.toUpperCase() + '</span>',
        {className:'stop-popup'}
      );

      if (targetLayer) {
        marker.addTo(targetLayer);
      } else {
        marker.addTo(layers.nlb);
      }
    });

    if (op === 'kmb')      totalKMB = stops.length;
    else if (op === 'ctb') totalCTB = stops.length;
    else if (op === 'nlb') totalNLB = stops.length;
    else                   totalOther += stops.length;
  }

  document.getElementById('cntKMB').textContent = totalKMB.toLocaleString();
  document.getElementById('cntCTB').textContent = totalCTB.toLocaleString();
  document.getElementById('cntNLB').textContent = totalNLB.toLocaleString();
  document.getElementById('kmbBadge').textContent = totalKMB.toLocaleString();
  document.getElementById('ctbBadge').textContent = totalCTB.toLocaleString();
  document.getElementById('nlbBadge').textContent = totalNLB.toLocaleString();

  status.textContent = 'Loaded ' + (totalKMB + totalCTB + totalNLB + totalOther).toLocaleString() + ' bus stops.';
  btn.textContent = 'Loaded ✓';
}


/* ================================================================
   DENSITY GRID OVERLAY
   ================================================================ */
function toggleDensity() {
  densityOn = !densityOn;
  const btn = document.getElementById('btnDensity');
  btn.classList.toggle('active', densityOn);

  if (densityOn) {
    buildDensityGrid();
    layers.density.addTo(map);
  } else {
    map.removeLayer(layers.density);
  }
}

function buildDensityGrid() {
  layers.density.clearLayers();

  // Collect all visible stop positions
  const allStops = [];
  if (busData) {
    for (const stops of Object.values(busData)) {
      stops.forEach(s => allStops.push([s.lat, s.lng]));
    }
  }
  // Add MTR stations
  MTR_STATIONS.forEach(s => allStops.push([s.la, s.lo]));

  if (allStops.length === 0) return;

  const cellDeg = 0.005;                       // ≈ 500 m
  const grid    = {};

  allStops.forEach(([lat, lng]) => {
    const r = Math.floor(lat / cellDeg);
    const c = Math.floor(lng / cellDeg);
    const k = r + ',' + c;
    if (!grid[k]) grid[k] = {lat: r*cellDeg + cellDeg/2, lng: c*cellDeg + cellDeg/2, n: 0};
    grid[k].n++;
  });

  const maxN = Math.max(...Object.values(grid).map(g => g.n), 1);
  const half = cellDeg / 2;

  Object.values(grid).forEach(g => {
    const t = Math.pow(g.n / maxN, 0.5);       // sqrt scale
    const col = densityColor(t);
    L.rectangle(
      [[g.lat - half, g.lng - half], [g.lat + half, g.lng + half]],
      {color:null, fillColor:col, fillOpacity:0.45 + t*0.25, weight:0}
    ).bindTooltip(`${g.n} stops`, {sticky:true}).addTo(layers.density);
  });
}

function densityColor(t) {
  if (t < 0.2)  return '#1565c0';
  if (t < 0.4)  return '#42a5f5';
  if (t < 0.55) return '#66bb6a';
  if (t < 0.7)  return '#fdd835';
  if (t < 0.85) return '#ff9800';
  return '#e53935';
}

/* ================================================================
   LAYER TOGGLE HELPER
   ================================================================ */
function toggleLayer(name, visible) {
  if (visible) layers[name].addTo(map);
  else map.removeLayer(layers[name]);
}

/* ================================================================
   AUTO-LOAD ON PAGE INIT
   ================================================================ */
// Auto-load bus data on page load
document.addEventListener('DOMContentLoaded', async () => {
  const btn = document.getElementById('btnLoad');
  const status = document.getElementById('status');
  
  console.log('Page loaded, attempting auto-load...');
  
  // Try multiple approaches to load the file
  const filePaths = [
    './stops_by_operator.json',
    'stops_by_operator.json',
    './stops_by_operator.json?nocache=' + Date.now()
  ];
  
  for (const filePath of filePaths) {
    try {
      console.log('Fetching', filePath, '...');
      const response = await fetch(filePath);
      console.log('Fetch response:', response.status, response.statusText);
      
      if (response.ok) {
        const text = await response.text();
        console.log('JSON fetched, parsing...');
        busData = JSON.parse(text);
        console.log('JSON parsed, rendering stops...');
        renderBusStops();
        status.textContent = 'Auto-loaded stops_by_operator.json';
        btn.textContent = 'Reload';
        console.log('Auto-load successful!');
        return;
      } else {
        console.log('Fetch failed for', filePath, 'status:', response.status);
      }
    } catch (err) {
      console.log('Auto-load error for', filePath, ':', err.message);
    }
  }
  
  // All attempts failed
  console.log('All auto-load attempts failed');
  status.textContent = 'Auto-load failed — click "Load Bus Stops" to load data';
});
</script>
